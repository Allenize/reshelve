name: reshelve
description: Reshelve - Inventory & POS App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Local persistence
  shared_preferences: ^2.2.2
  # PDF generation & printing
  pdf: ^3.10.7
  printing: ^5.11.1
  # Camera / image picker
  image_picker: ^1.0.7
  # Mobile scanner (barcode)
  mobile_scanner: ^3.5.6
  # UUID generation
  uuid: ^4.3.3
  # Icons
  cupertino_icons: ^1.0.6
  intl: ^0.19.0
  # Sharing / export
  share_plus: ^7.2.2
  path_provider: ^2.1.2
  # State management
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
